# ENVIROMENT VARIABLES
spring.config.import=optional:file:.env.properties

# Server configuration
server.port=8090
spring.application.name=posgrados

# API documentation settings
springdoc.api-docs.enabled=${ENABLE_API_DOCS}
springdoc.swagger-ui.enabled=${ENABLE_SWAGGER_UI}
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/dev/docs/swagger-ui.html

# Database configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Security settings
spring.security.user.name=${APP_USER:admin}
spring.security.user.password=${APP_PASSWORD:change-me}