# Load environment vars from either current execution dir or repo root.
spring.config.import=optional:file:.env.properties,optional:file:../../.env.properties

# Server configuration
spring.application.name=${APP_NAME}

# Global context path for all REST endpoints
server.servlet.context-path=${APP_PREFIX}

# Forward headers strategy (important for proxies like Railway/Heroku)
server.forward-headers-strategy=framework
server.tomcat.remoteip.remote-ip-header=X-Forwarded-For
server.tomcat.remoteip.protocol-header=X-Forwarded-Proto

# API REST prefixes
api.rest.prefix=/api/dev/endpoint
api.rest.cases-prefix=/api/application/case
api.rest.command-prefix=/api/application/command

# Required module load markers (fail-fast if missing)
app.module.name.api-base=${APP_MODULE_NAME_API_BASE}
app.module.name.api-core=${APP_MODULE_NAME_API_CORE}
app.module.name.api-rest=${APP_MODULE_NAME_API_REST}
app.module.name.api-auth=${APP_MODULE_NAME_API_AUTH}
app.module.name.security=${APP_MODULE_NAME_SECURITY}
app.module.name.mail-module=${APP_MODULE_NAME_MAIL_MODULE}
app.module.name.s3-storage=${APP_MODULE_NAME_S3_STORAGE}

# Database configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER}
spring.jpa.database-platform=${DB_DIALECT}
spring.jpa.properties.hibernate.default_schema=${DB_SCHEMA}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Security configuration
spring.security.user.name=${SPRING_SECURITY_USER_NAME}
spring.security.user.password=${SPRING_SECURITY_USER_PASSWORD}
spring.security.user.roles=ADMIN

# JWT and auth configuration
app.jwt.secret=${JWT_SECRET:dev-secret-change-me-must-be-long}
app.jwt.issuer=ufps-posgrados
app.jwt.access-expiration-minutes=120
app.jwt.refresh-expiration-minutes=10080
app.auth.password.allow-plain-text-legacy=true

# Configuration for API documentation
springdoc.api-docs.enabled=${ENABLE_API_DOCS}
springdoc.swagger-ui.enabled=${ENABLE_SWAGGER_UI}
springdoc.api-docs.path=${SWAGGER_API_DOCS_PATH}
springdoc.swagger-ui.path=${SWAGGER_UI_PATH}
springdoc.use-fqn=true
springdoc.swagger-ui.use-root-path=false

# Mail Configuration
resend.api.key=${RESEND_API_KEY}
mail.from=${MAIL_FROM}

# Configuración de Hiberneate para optimizar el rendimiento de las consultas
spring.jpa.properties.hibernate.default_batch_fetch_size=16

# Multipart uploads
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB
