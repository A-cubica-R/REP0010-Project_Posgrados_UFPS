# Load environment vars from either current execution dir or repo root.
spring.config.import=optional:file:.env.properties,optional:file:../.env.properties

# Server configuration
spring.application.name=${APP_NAME}

# Required module load markers (fail-fast if missing)
app.module.name.api-base=${APP_MODULE_NAME_API_BASE}
app.module.name.api-core=${APP_MODULE_NAME_API_CORE}
app.module.name.api-rest=${APP_MODULE_NAME_API_REST}

# Database configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER}
spring.jpa.database-platform=${DB_DIALECT}
spring.jpa.properties.hibernate.default_schema=${DB_SCHEMA}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.open-in-view=false


